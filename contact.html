<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

    body {
    margin: 0;
    min-height: 100vh;
    background: 
        linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
        url('https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=1200&auto=format&fit=crop');

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
}
.contacto{
    
    max-width:700px;
    margin:auto;
    padding:40px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.contacto h1{
    text-align:center;
    margin-bottom:25px;
    color:#fbfcff;
    font-size:35px;
}

/* FORMULARIO */
.contacto form{
    display:flex;
    flex-direction:column;
    gap:20px;
}

.contacto input,
.contacto textarea{
    width:100%;
    padding:15px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
    outline:none;
    transition:0.3s;
}

/* HOVER Y FOCUS */
.contacto input:focus,
.contacto textarea:focus{
    border-color:#0b3d91;
    box-shadow:0 0 8px rgba(11,61,145,0.3);
}

/* BOTÓN */
.contacto button{
    background:#0b3d91;
    color:white;
    border:none;
    padding:15px;
    font-size:18px;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

.contacto button:hover{
    background:#06245e;
    transform:scale(1.03);
}
    </style>
</head>
<body>
     <section id="contacto">
    <div class="container">
      <div class="contacto">
        <h1>Contacto</h1>

        <form>
          <input type="text" placeholder="Tu nombre" required>
          <input type="email" placeholder="Tu correo" required>
          <textarea rows="5" placeholder="Tu mensaje"></textarea>
          <button type="submit">Enviar Mensaje</button>
        </form>

      </div>
    </div>
  </section>
</body>
</html>
